<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graviton CMS | School Lifecycle Manager</title>
    <meta name="description" content="Offline-first, serverless school management system.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Libraries (CDNs) -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Auth Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-header text-center">
                <div class="login-logo-glow">
                    <i data-lucide="school"></i>
                </div>
                <h2>Portal Sign In</h2>
                <p class="text-secondary text-sm mt-1">Enter your credentials to access your<br>dashboard</p>
            </div>
            <form id="login-form" class="login-form mt-2">
                <div class="form-group mb-1">
                    <label class="login-label" for="login-email">ID / EMAIL ADDRESS</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail"></i>
                        <input type="email" id="login-email" class="login-input" required placeholder="Student ID or Staff Email">
                    </div>
                </div>
                <div class="form-group mb-2">
                    <div class="flex-between mb-1">
                        <label class="login-label" for="login-password">PASSWORD</label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <div class="input-with-icon">
                        <i data-lucide="lock"></i>
                        <input type="password" id="login-password" class="login-input" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn-login w-100 mt-2" id="login-submit-btn">
                    <span>Sign In to Account</span>
                    <i data-lucide="log-in"></i>
                </button>
                <div id="login-error" class="login-error mt-1 text-center" style="display: none; color: #f87171; font-size: 0.85rem;"></div>
                
                <div class="text-center" style="margin-top: 2rem;">
                    <a href="#" class="create-account-link">New Faculty Member? Create Account</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="atom" class="logo-icon"></i>
                    <span>GRAVITON</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle">
                    <i data-lucide="chevron-left"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#students" class="nav-item" data-view="students">
                    <i data-lucide="users"></i>
                    <span>Students</span>
                </a>
                <a href="#academic" class="nav-item" data-view="academic">
                    <i data-lucide="book-open"></i>
                    <span>Academic</span>
                </a>
                <a href="#grades" class="nav-item" data-view="grades">
                    <i data-lucide="graduation-cap"></i>
                    <span>Grades</span>
                </a>
                <a href="#attendance" class="nav-item" data-view="attendance">
                    <i data-lucide="calendar-check"></i>
                    <span>Attendance</span>
                </a>
                <a href="#reports" class="nav-item" data-view="reports">
                    <i data-lucide="file-text"></i>
                    <span>Reports</span>
                </a>
                <a href="#promotion" class="nav-item" data-view="promotion">
                    <i data-lucide="trending-up"></i>
                    <span>Promotion</span>
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div id="sync-status" class="sync-status">
                    <div class="status-indicator live"></div>
                    <span class="status-text">Cloud Live</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title" style="display: flex; align-items: center; gap: 1rem;">
                    <button id="mobile-menu-btn" class="mobile-menu-btn" style="display: none;">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 id="view-title">Dashboard</h1>
                </div>
                <div class="user-profile">
                    <button id="logout-btn" class="btn btn-sm btn-secondary mr-2">
                        <i data-lucide="log-out"></i> Logout
                    </button>
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=admin" alt="Avatar">
                    </div>
                </div>
            </header>
            
            <div id="content-area" class="content-area">
                <!-- Content will be injected here -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="notification-container"></div>

    <!-- Scripts -->
    <script type="module" src="assets/js/main.js?v=4"></script>
</body>
</html>
