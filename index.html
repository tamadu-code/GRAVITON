<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graviton CMS | School Lifecycle Manager</title>
    <meta name="description" content="Offline-first, serverless school management system.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Libraries (CDNs) -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="atom" class="logo-icon"></i>
                    <span>GRAVITON</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle">
                    <i data-lucide="chevron-left"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#students" class="nav-item" data-view="students">
                    <i data-lucide="users"></i>
                    <span>Students</span>
                </a>
                <a href="#academic" class="nav-item" data-view="academic">
                    <i data-lucide="book-open"></i>
                    <span>Academic</span>
                </a>
                <a href="#grades" class="nav-item" data-view="grades">
                    <i data-lucide="graduation-cap"></i>
                    <span>Grades</span>
                </a>
                <a href="#attendance" class="nav-item" data-view="attendance">
                    <i data-lucide="calendar-check"></i>
                    <span>Attendance</span>
                </a>
                <a href="#reports" class="nav-item" data-view="reports">
                    <i data-lucide="file-text"></i>
                    <span>Reports</span>
                </a>
                <a href="#promotion" class="nav-item" data-view="promotion">
                    <i data-lucide="trending-up"></i>
                    <span>Promotion</span>
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div id="sync-status" class="sync-status">
                    <div class="status-indicator live"></div>
                    <span class="status-text">Cloud Live</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="view-title">Dashboard</h1>
                </div>
                <div class="user-profile">
                    <select id="role-selector" class="input role-selector">
                        <option value="Admin">Admin View</option>
                        <option value="Teacher">Teacher View</option>
                        <option value="Student">Student View</option>
                    </select>
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Administrator</span>
                    </div>
                    <div class="user-avatar">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=admin" alt="Avatar">
                    </div>
                </div>
            </header>
            
            <div id="content-area" class="content-area">
                <!-- Content will be injected here -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="notification-container"></div>

    <!-- Scripts -->
    <script type="module" src="assets/js/db.js"></script>
    <script type="module" src="assets/js/supabase-client.js"></script>
    <script type="module" src="assets/js/utils.js"></script>
    <script type="module" src="assets/js/ui.js"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
